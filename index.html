<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool Nối Từ - Tự Động</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <div class="container">
        <h2><span>💧</span> Nối Từ Tự Động <span>🔮</span></h2>
        <input type="text" id="wordInput" placeholder="Đợi tự động dán hoặc nhập từ..." autocomplete="off" autofocus>
        <div class="results-header">
            <span>✨ Kết quả</span>
            <span id="resultCount">0 từ</span>
        </div>
        <ul id="resultsList" class="results-list">
            <li class="empty-msg">Đang tải từ điển...</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
