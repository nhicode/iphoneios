<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Glass Tool Nối Từ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-overlay" class="overlay">
        <div class="overlay-content">
            <span class="icon">✨</span>
            <h3>Click anywhere to Start & Paste</h3>
            <p>Nhấp vào bất cứ đâu để bắt đầu & dán</p>
        </div>
    </div>
    
    <div class="main-wrapper">
        <div class="app-container">
            <header>
                <h2>Tool Nối Từ Liquid Glass</h2>
                <div class="liquid-dots">
                    <span class="dot cyan"></span>
                    <span class="dot white"></span>
                    <span class="dot cyan"></span>
                </div>
            </header>
            
            <section class="input-section">
                <input type="text" id="opponent-word" placeholder="Tự động dán hoặc nhập từ đối thủ..." autocomplete="off">
            </section>

            <section class="results-section">
                <div class="results-header">
                    <span id="result-status">Kho dữ liệu: 0 từ</span>
                    <span id="result-count">0 từ gợi ý</span>
                </div>
                
                <ul id="results-list" class="results-list">
                    <li class="empty-msg">Chưa có dữ liệu.</li>
                </ul>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
