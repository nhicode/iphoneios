<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool Gợi Ý Nối Từ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🔍 Tool Hack Nối Từ</h2>
        
        <div class="input-group">
            <input type="text" id="opponent-word" placeholder="Nhập từ của đối thủ (VD: thời tiết)..." autocomplete="off">
            <button id="search-btn">Tìm Từ</button>
        </div>

        <div class="results-header">
            <span>Kết quả gợi ý:</span>
            <span id="result-count">0 từ</span>
        </div>
        
        <ul id="results-list" class="results-list">
            <li class="empty-msg">Chưa có dữ liệu. Hãy nhập từ để tìm!</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
