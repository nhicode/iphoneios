<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nối Từ Tự Động – Liquid Glass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="glass-container" id="appContainer">
        <div class="glass-highlight"></div>
        <h2 class="title">
            <span class="icon">💧</span> Nối Từ Tự Động <span class="icon">🔮</span>
        </h2>

        <div class="input-wrapper">
            <input type="text" id="wordInput" placeholder="Chạm vào màn hình để dán từ..." autocomplete="off">
            <button class="clear-btn" id="clearBtn" aria-label="Xoá từ">✕</button>
        </div>

        <div class="results-header">
            <span>✨ Gợi ý</span>
            <span id="resultCount">0 từ</span>
        </div>

        <ul id="resultsList" class="results-list">
            <li class="empty-msg">Đang tải dữ liệu...</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
